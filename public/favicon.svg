<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="BK favicon">
  <defs>
    <linearGradient id="bkGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020205" />
      <stop offset="55%" stop-color="#030816" />
      <stop offset="100%" stop-color="#072043" />
    </linearGradient>
    <radialGradient id="topCyanGlow" cx="30%" cy="18%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.34" />
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bottomVioletGlow" cx="18%" cy="88%" r="70%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.28" />
      <stop offset="65%" stop-color="#6d28d9" stop-opacity="0" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0" />
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.4" flood-color="#0f172a" flood-opacity="0.22" />
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bkGradient)" />
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#topCyanGlow)" />
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bottomVioletGlow)" />
  <text
    x="32"
    y="39"
    text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="26"
    font-weight="800"
    letter-spacing="0.5"
    fill="#d9e8f7"
    fill-opacity="0.9"
    filter="url(#softShadow)"
  >
    BK
  </text>
</svg>
